    <!-- Public embed: only pattern library + quantity demo. Task hub (/) and other flows are blocked. -->
    <script>
      (function () {
        var ALLOWED = /^#\/(design-system|find-inventory-balance)(\/|$)/;
        function hubPath() {
          var h = location.hash || '';
          if (!h || h === '#') return '/';
          return (h.indexOf('#') === 0 ? h.slice(1) : h).split('?')[0] || '/';
        }
        function enforce() {
          var path = hubPath();
          if (path === '/' || !ALLOWED.test(location.hash || '')) {
            location.replace(location.pathname + location.search + '#/design-system');
          }
        }
        enforce();
        window.addEventListener('hashchange', enforce);
      })();
    </script>
